<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DigitSense — Handwritten Digit Recognizer</title>
<style>
  :root{
    --ink:#101317;
    --paper:#f4f1ea;
    --accent:#3d7eff;
    --line:#262b31;
    --mono: 'JetBrains Mono', 'Courier New', monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--ink);
    color:var(--paper);
    font-family:'Helvetica Neue', Arial, sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:36px 18px 50px;
  }
  .eyebrow{
    font-family:var(--mono);
    font-size:12px;
    letter-spacing:3px;
    text-transform:uppercase;
    color:var(--accent);
    margin-bottom:8px;
  }
  h1{ font-size:30px; font-weight:700; letter-spacing:-0.5px; }
  p.sub{ color:#9aa1ab; font-size:14px; margin-top:8px; max-width:340px; text-align:center; }

  main{ margin-top:28px; display:flex; flex-direction:column; align-items:center; gap:16px; }

  #canvas{
    background:#000;
    border:1px solid var(--line);
    border-radius:4px;
    touch-action:none;
    cursor:crosshair;
  }

  .controls{ display:flex; gap:10px; }
  button{
    font-family:var(--mono);
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:0.5px;
    background:transparent;
    color:var(--paper);
    border:1px solid var(--line);
    padding:11px 18px;
    border-radius:3px;
    cursor:pointer;
  }
  button:hover{ border-color:var(--accent); color:var(--accent); }
  button.primary{
    background:var(--accent);
    border-color:var(--accent);
    color:#0d1117;
    font-weight:700;
  }
  button.primary:hover{ color:#0d1117; opacity:0.85; }

  .status{ font-family:var(--mono); font-size:12px; color:#6b7280; min-height:16px; }

  .result{
    margin-top:6px;
    display:none;
    flex-direction:column;
    align-items:center;
    gap:14px;
  }
  .prediction{
    font-size:72px;
    font-weight:800;
    color:var(--accent);
    line-height:1;
  }
  .confidence{ font-family:var(--mono); font-size:12px; color:#9aa1ab; }

  .bars{ width:280px; display:flex; flex-direction:column; gap:6px; }
  .bar-row{ display:grid; grid-template-columns:14px 1fr 36px; gap:8px; align-items:center; }
  .bar-row span{ font-family:var(--mono); font-size:11px; color:#888; }
  .bar-track{ height:5px; background:#1c2128; border-radius:3px; overflow:hidden; }
  .bar-fill{ height:100%; background:var(--accent); width:0%; transition:width .4s ease; }

  footer{
    margin-top:36px;
    font-family:var(--mono);
    font-size:11px;
    color:#4b5159;
    text-align:center;
  }
</style>
</head>
<body>

<div class="eyebrow">Mini Project — Neural Network Inference</div>
<h1>DigitSense</h1>
<p class="sub">Draw a digit from 0–9. A neural network trained on the MNIST dataset reads it in real time, entirely in your browser.</p>

<main>
  <canvas id="canvas" width="280" height="280"></canvas>

  <div class="controls">
    <button class="primary" id="predictBtn">Predict</button>
    <button id="clearBtn">Clear</button>
  </div>

  <div class="status" id="status">loading model…</div>

  <div class="result" id="result">
    <div class="prediction" id="predictionDigit">–</div>
    <div class="confidence" id="confidenceText"></div>
    <div class="bars" id="bars"></div>
  </div>
</main>

<footer>built with tensorflow.js · MNIST-trained CNN · 100% client-side</footer>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.15.0/dist/tf.min.js"></script>
<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const statusEl = document.getElementById('status');
  const predictBtn = document.getElementById('predictBtn');
  const clearBtn = document.getElementById('clearBtn');
  const resultEl = document.getElementById('result');
  const predictionDigit = document.getElementById('predictionDigit');
  const confidenceText = document.getElementById('confidenceText');
  const barsEl = document.getElementById('bars');

  // canvas setup
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 18;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  let drawing = false;
  let lastX = 0, lastY = 0;

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: clientX - rect.left, y: clientY - rect.top };
  }

  function start(e) {
    drawing = true;
    const pos = getPos(e);
    lastX = pos.x; lastY = pos.y;
  }
  function move(e) {
    if (!drawing) return;
    e.preventDefault();
    const pos = getPos(e);
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
    lastX = pos.x; lastY = pos.y;
  }
  function end() { drawing = false; }

  canvas.addEventListener('mousedown', start);
  canvas.addEventListener('mousemove', move);
  canvas.addEventListener('mouseup', end);
  canvas.addEventListener('mouseleave', end);
  canvas.addEventListener('touchstart', start);
  canvas.addEventListener('touchmove', move);
  canvas.addEventListener('touchend', end);

  clearBtn.addEventListener('click', () => {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    resultEl.style.display = 'none';
  });

  let model = null;
  const MODEL_URL = 'https://storage.googleapis.com/tfjs-models/tfjs/mnist_v1/model.json';

  async function loadModel() {
    statusEl.textContent = 'loading model…';
    model = await tf.loadLayersModel(MODEL_URL);
    statusEl.textContent = 'model ready — draw a digit';
  }
  loadModel();

  predictBtn.addEventListener('click', async () => {
    if (!model) {
      statusEl.textContent = 'model still loading…';
      return;
    }
    statusEl.textContent = 'predicting…';

    const prediction = tf.tidy(() => {
      let img = tf.browser.fromPixels(canvas, 1);
      img = tf.image.resizeBilinear(img, [28, 28]);
      img = img.toFloat().div(255.0);
      img = img.reshape([1, 28, 28, 1]);
      return model.predict(img);
    });

    const data = await prediction.data();
    prediction.dispose();

    renderResult(data);
    statusEl.textContent = 'done';
  });

  function renderResult(probs) {
    const arr = Array.from(probs);
    const maxIdx = arr.indexOf(Math.max(...arr));
    const maxConf = (arr[maxIdx] * 100).toFixed(1);

    predictionDigit.textContent = maxIdx;
    confidenceText.textContent = `${maxConf}% confidence`;
    resultEl.style.display = 'flex';

    barsEl.innerHTML = '';
    arr.forEach((p, digit) => {
      const pct = (p * 100).toFixed(1);
      const row = document.createElement('div');
      row.className = 'bar-row';
      row.innerHTML = `
        <span>${digit}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
        <span>${pct}%</span>
      `;
      barsEl.appendChild(row);
    });
  }
</script>

</body>
</html>
